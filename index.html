<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>haxing</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* VIDEO */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 90%;
    max-width: 500px;
    padding: 45px;
    border-radius: 30px;
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 60px rgba(0,255,200,0.25);
    text-align: center;
    color: white;
    animation: fadeIn 1s ease;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 80px rgba(0,255,200,0.4);
}

/* PROFILE */
.profile {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 2px solid rgba(0,255,200,0.6);
}

/* NAME */
h1 {
    font-size: 32px;
    margin-bottom: 5px;
}

/* SUB */
.sub {
    opacity: 0.7;
    margin: 5px 0;
}

/* STATUS */
.status {
    font-size: 13px;
    margin: 10px 0;
    color: #00ffc8;
}

/* BUTTON */
.btn {
    position: relative;
    display: block;
    padding: 15px;
    margin-top: 12px;
    border-radius: 14px;
    color: white;
    background: rgba(255,255,255,0.12);
    cursor: pointer;
    transition: 0.3s;
    font-size: 16px;
}

.btn:hover {
    background: rgba(0,255,200,0.3);
    transform: scale(1.05);
}

.sound-note {
    margin-top: 16px;
    color: #b7fff6;
    font-size: 14px;
    opacity: 0.8;
}

/* COPY TEXT */
.copy-msg {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    opacity: 0;
    transition: 0.3s;
    color: #00ffc8;
}

/* FADE ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>

</head>
<body>

<video id="bgVideo" autoplay loop muted playsinline preload="auto">
    <source src="vid.mp4" type="video/mp4">
</video>

<script>
const v = document.getElementById("bgVideo");
const soundButton = document.getElementById("soundButton");

// ses seviyesi
v.volume = 0.2;

// video hazır olunca başlat
v.addEventListener("canplay", () => {
    v.play().catch(() => {});
});

// sesi açmayı “tek stabil event” ile yap
let soundUnlocked = false;

function unlockSound() {
    if (!soundUnlocked) {
        v.muted = false;
        v.volume = 0.2;
        v.play().catch(() => {});
        soundUnlocked = true;
        if (soundButton) {
            soundButton.textContent = "Ses Açıldı";
            soundButton.style.opacity = "0.7";
            soundButton.style.pointerEvents = "none";
        }
    }
}

document.addEventListener("click", unlockSound, { once: true });
if (soundButton) {
    soundButton.addEventListener("click", unlockSound);
}
</script>

<div class="overlay"></div>

<div class="container">
    <div class="card">

        <img src="pp.jpg" class="profile">

        <h1>haxing</h1>
        <div class="sub">inceptionrpg.com</div>
        <div class="sub">📍 Ankara, Mamak</div>

        <div class="status">● online</div>

        <div class="sound-note">Ses duymak için ekrana tıklayın.</div>
        <div class="btn" id="soundButton">Ses Aç</div>

        <div class="btn" onclick="copyDiscord(this)">
            Discord
            <div class="copy-msg">Kopyalandı!</div>
        </div>

    </div>
</div>

<script>
function copyDiscord(el) {
    const text = "ustunde"; // BURAYA DC ADINI YAZ

    navigator.clipboard.writeText(text);

    const msg = el.querySelector(".copy-msg");
    msg.style.opacity = "1";

    setTimeout(() => {
        msg.style.opacity = "0";
    }, 2000);
}
</script>

</body>
</html>
